  <body class="bg-gray-900">
    <div id="root"></div>
    <!-- Push self-heal: re-registers a rotated/wiped push subscription on every
         load + focus when permission is already granted. Vanilla JS so it works
         without a bundle rebuild. -->
    <script>
    (function () {
      function b64ToUint8(base64) {
        var pad = "=".repeat((4 - (base64.length % 4)) % 4);
        var b = (base64 + pad).replace(/-/g, "+").replace(/_/g, "/");
        var raw = atob(b), out = new Uint8Array(raw.length);
        for (var i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
        return out;
      }
      async function syncPush() {
        try {
          if (!("serviceWorker" in navigator) || !("PushManager" in window) || !("Notification" in window)) return;
          if (Notification.permission !== "granted") return;
          var reg = await navigator.serviceWorker.ready;
          var res = await fetch("/api/push/public-key", { credentials: "same-origin" });
          if (!res.ok) return;
          var pk = (await res.json()).publicKey;
          if (!pk) return;
          var sub = await reg.pushManager.getSubscription();
          var lastKey = null; try { lastKey = localStorage.getItem("jh_vapid_key"); } catch (e) {}
          if (sub && lastKey && lastKey !== pk) { try { await sub.unsubscribe(); } catch (e) {} sub = null; }
          if (!sub) {
            sub = await reg.pushManager.subscribe({
              userVisibleOnly: true,
              applicationServerKey: b64ToUint8(pk),
            });
          }
          await fetch("/api/push/subscribe", {
            method: "POST", credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ subscription: sub.toJSON() }),
          });
          try { localStorage.setItem("jh_vapid_key", pk); } catch (e) {}
        } catch (e) { /* silent — never block the app */ }
      }
      if (document.readyState === "complete") syncPush();
      else window.addEventListener("load", syncPush);
      window.addEventListener("focus", function () { setTimeout(syncPush, 500); });
    })();
    </script>
    <!-- Admin entry point for the PWA (admin-only). The full admin panel lives at
         /admin (server-rendered). Injected here so it works without rebuilding the
         React bundle. Hidden entirely for non-admin users. -->
    <script>
    (function () {
      function addAdminButton() {
        fetch("/api/me", { credentials: "same-origin" })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (u) {
            if (!u || !(u.role === "admin" || u.is_admin)) return;
            if (document.getElementById("jh-admin-fab")) return;
            var a = document.createElement("a");
            a.id = "jh-admin-fab";
            a.href = "/admin";
            a.textContent = "👑 Admin";
            a.setAttribute("aria-label", "Open Admin Panel");
            a.style.cssText =
              "position:fixed;right:12px;bottom:80px;z-index:9999;" +
              "background:#4f46e5;color:#fff;font:600 13px/1 system-ui,-apple-system,sans-serif;" +
              "padding:10px 14px;border-radius:9999px;text-decoration:none;" +
              "box-shadow:0 4px 14px rgba(0,0,0,.4);";
            document.body.appendChild(a);
          })
          .catch(function () {});
      }
      if (document.readyState === "complete") addAdminButton();
      else window.addEventListener("load", addAdminButton);
    })();
    </script>
